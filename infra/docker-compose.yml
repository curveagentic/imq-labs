services:
  postgres:
    image: postgres:16-alpine
    container_name: afrostream-postgres
    environment:
      POSTGRES_USER: afrostream
      POSTGRES_PASSWORD: afrostream
      POSTGRES_DB: afrostream
    ports: ['5432:5432']
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/init_v2.sql:/docker-entrypoint-initdb.d/02_init_v2.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afrostream']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: afrostream-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: afrostream
      MINIO_ROOT_PASSWORD: afrostream_minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./storage/minio:/data

# Notes:
# - The API and Web app run on the host with `npm run dev` for fast iteration.
#   Add Dockerfiles for API/Web later when you need parity for staging/prod.
# - Postgres init.sql is mounted read-only and runs on first boot.
# - MinIO is included for forward-compatibility with the S3-style storage layer
#   in services/api/src/lib/storage.js. The MVP uses local disk by default.
